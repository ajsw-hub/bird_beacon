<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title th:text = "${birdId}"></title>
    </head>
    <body>
    <a href="/logout">Logout</a>
    <a href="/birdfeed">Bird Feed</a>
    <a href="/profile">Profile</a>
    <a href="/birdpedia">Birdpedia</a>

    <h2 th:text = "${chosenBird.getName()} "></h2>
    <p th:text = "'Scientific Name: ' + ${chosenBird.getSciname()}"></p>
    <p th:text = "'Family: ' + ${chosenBird.getFamily()}"></p>
    <p th:text = "'Order: ' + ${chosenBird.getBirdorder()}"></p>
    <p th:text = "'Satus:  ' + ${chosenBird.getStatus()}"></p>
    <p th:text = "'Minimum Length: ' + ${chosenBird.getLengthmin()} + ' cm'"></p>
    <p th:text = "'Maximum Length: ' + ${chosenBird.getLengthmax()} + ' cm'"></p>
    <p th:text = "'Minimum Wingspan: ' + ${chosenBird.getWingspanmin()} + ' cm'"></p>
    <p th:text = "'Maximum Wingspan: ' + ${chosenBird.getWingspanmax()} + ' cm'"></p>
    <p th:text = "'Rarity: ' + ${birdRarity}"></p>


    </body>
</html>
