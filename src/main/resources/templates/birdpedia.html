    <head>
        <meta charset="UTF-8">
        <title>Birdpedia</title>

        <style>
            .popupBox {
                display: none;
                position: fixed;
                top: 30px;
                right: 7px;
                background-color: #87e082;
                color: black;
                padding: 8px;
                border-radius: 5px;
            }
        </style>

    <body>
        <a href="/logout">Logout</a>
        <a href="/birdfeed">Bird Feed</a>
        <a href="/my-aviary">Profile</a>
        <a href="/birdpedia">Birdpedia</a>
        <h1 class="page_title">Birdpedia</h1>



        <th:block th:each = "letter : ${#numbers.sequence(0,25)}">

            <h3 th:text = "${alphabet[letter]}"></h3>
            <ul>
                <li th:each = "bird : ${alphabeticalBirdsList[letter]}" th:id="'bird_' + ${bird.getId()}" class = "Gerald"
                    th:attr  = "data-img = ${bird.getImages()},
                                data-name = ${bird.getName()},
                                data-sciname = ${bird.getSciname()},
                                data-family = ${bird.getFamily()},
                                data-status = ${bird.getStatus()}">

                    <a th:href="@{/birdpedia/{birdId}(birdId = ${bird.getId()})}" >
                        <p th:text = "${bird.getName()}"></p>
                    </a>
                    <div th:id="'bird_'+${bird.getId()}+'_popup'" class = "popupBox">
                        <p th:text = "${bird.getName()}"></p>
                        <img th:src="${bird.getImages()}" alt="" width = "150px">
                    </div>
                </li>
            </ul>

        </th:block>

        <script th:inline="javascript">

                            const popupBox = document.querySelector(".popupBox");

                            document.querySelectorAll(".Gerald").forEach(bird => {

                                                        popupBox.style.display = 'block';

                                                            <p>${bird.dataset.sciname}</p>
                                                            <p><b>Family Name:</b></p>
                                                            <p>${bird.dataset.family}</p>
                                                            <p><b>Conservation Status: </b></p>
                                                            <p>${bird.dataset.status}</p>`


                                                        } ) } )


        </script>
