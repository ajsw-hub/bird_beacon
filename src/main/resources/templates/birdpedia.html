<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
    <head>
        <meta charset="UTF-8">
        <title>Birdpedia</title>
        <link rel="stylesheet" th:href="@{/main.css}"/>
        <style>
            .popupBox {
                display: none;
                position: fixed;
                top: 30px;
                right: 7px;
                background-color: #87e082;
                color: black;
                padding: 8px;
                border-radius: 5px;
            }
        </style>

    </head>

    <body>
    <div th:replace="~{base :: header}"></div>



        <th:block th:each = "letter : ${#numbers.sequence(0,25)}">

            <h3 th:text = "${alphabet[letter]}"></h3>
            <ul>
                <li th:each = "bird : ${alphabeticalBirdsList[letter]}" th:id="'bird_' + ${bird.getId()}" class = "Gerald"
                    th:attr  = "data-img = ${bird.getImages()},
                                data-name = ${bird.getName()},
                                data-sciname = ${bird.getSciname()},
                                data-family = ${bird.getFamily()},
                                data-status = ${bird.getStatus()}">

                    <a th:href="@{/birdpedia/{birdId}(birdId = ${bird.getId()})}" >
                        <p th:text = "${bird.getName()}"></p>
                    </a>
                    <div th:id="'bird_'+${bird.getId()}+'_popup'" class = "popupBox">
                        <p th:text = "${bird.getName()}"></p>
                        <img th:src="${bird.getImages()}" alt="" width = "150px">
                    </div>
                </li>
            </ul>

        </th:block>

        <script th:inline="javascript">

            const elementToHover = document.getElementById([[${bird_81}]]);
            const elementToPopup = document.getElementById([[${bird_81}+'_popup']]);

            elementToHover.addEventListener('mouseenter',() => {elementToPopup.style.display = 'block'; });
            elementToHover.addEventListener('mouseleave',() => {elementToPopup.style.display = 'none';});

        </script>

        <script th:inline="javascript">
            const elementToHover22 = document.getElementById([[${bird_22}]]);
            const elementToPopup22 = document.getElementById([[${bird_22}+'_popup']]);

            elementToHover22.addEventListener('mouseenter',() => {elementToPopup22.style.display = 'block'; });
            elementToHover22.addEventListener('mouseleave',() => {elementToPopup22.style.display = 'none';});

        </script>



    <th:block th:each = "bird : ${htmlBirdIds}">

        <script th:inline="javascript">

            const [['birdId_hover_'+${bird}]] = document.getElementById([['bird_' + ${bird}]]);
            const [['birdId_popup_'+${bird}]] = document.getElementById([['bird_' + ${bird} + '_popup']]);

            [['birdId_hover_'+${bird}]].addEventListener('mouseenter',() => {[['birdId_popup_'+${bird}]].style.display = 'block'; });
            [['birdId_hover_'+${bird}]].addEventListener('mouseleave',() => {[['birdId_popup_'+${bird}]].style.display = 'none';});
        </script>
    </th:block>
