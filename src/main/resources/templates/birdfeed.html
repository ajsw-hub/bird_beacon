<!--    Okay this below is the map logic where click sets the lat and lng numbers in our form which is hidden-->

<!--    This is java script for the post map when creating post.-->
<script>
    // 1. Create map (this links to your <div id="map">)
        const map = L.map('map').setView([51.505, -0.09], 13);
        // 2. Add OpenStreetMap tiles (this is the actual map visuals)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
        }).addTo(map);
        // 3. Marker variable (we reuse it so we don't create infinite markers)
        let marker;
        // 4. When user clicks map → update hidden inputs
        map.on('click', function (e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        // THIS is the important bridge to Spring Boot
        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;
        // Move marker or create it
        if (marker) {
        marker.setLatLng(e.latlng);
        } else {
        marker = L.marker(e.latlng).addTo(map);
        }
        });
</script>

<!--This is the JS for the little maps in the actual post -->
<script>
    document.querySelectorAll(".mini-map").forEach(function(el) {
        const lat = parseFloat(el.dataset.lat);
        const lng = parseFloat(el.dataset.lng);
        const miniMap = L.map(el, {
            zoomControl: false,
            scrollWheelZoom: false,
            dragging: false,
            doubleClickZoom: false,
            boxZoom: false
        }).setView([lat, lng], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(miniMap);
        L.marker([lat, lng]).addTo(miniMap);

        // click = expand
        el.addEventListener("click", function () {
            el.classList.toggle("expanded");
            setTimeout(() => {
                miniMap.invalidateSize();
            }, 200);
        });
    });

</script>
<!--    This Js is to prevent over 10mb uploads-->
<script>
    document.querySelector("input[name='user_bird']").addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;
        const maxSize = 10 * 1024 * 1024; // 10MB in bytes
        if (file.size > maxSize) {
            alert("Image is too large! Max size is 10MB.");
            // clear the input
            this.value = "";
        }
    });
</script>

<!--    This iss the js for the bird search feature-->
<script>
    const input = document.getElementById("bird-search");
    const suggestions = document.getElementById("suggestions");
    const hiddenId = document.getElementById("bird-id");
    let timeout;
    input.addEventListener("input", function () {
        clearTimeout(timeout);
        const q = this.value;

        if (q.length < 2) {
            suggestions.innerHTML = "";
            return;
        }
        timeout = setTimeout(() => {
            fetch(`/birds/search?q=${encodeURIComponent(q)}`)
                .then(res => res.json())
                .then(data => {
                    suggestions.innerHTML = "";
                    data.forEach(bird => {
                        const div = document.createElement("div");
                        div.textContent = bird.name;
                        div.style.padding = "6px";
                        div.style.cursor = "pointer";
                        div.style.background = "white";
                        div.style.border = "1px solid #ddd";
                        div.addEventListener("click", () => {
                            input.value = bird.name;
                            hiddenId.value = bird.id;
                            suggestions.innerHTML = "";
                        });
                        suggestions.appendChild(div);
                    });
                });
        }, 200);
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const unknownBirdBtn = document.getElementById("unknown-bird");
        const birdWrapper = document.getElementById("bird-search-wrapper");
        const birdInput = document.getElementById("bird-search");
        const suggestions = document.getElementById("suggestions");
        const birdId = document.getElementById("bird-id");
        const resetBtn = document.querySelector("input[type='reset']");
        let unknownMode = false;
        unknownBirdBtn.addEventListener("click", function () {
            unknownMode = !unknownMode;
            if (unknownMode) {
                // ENTER UNKNOWN MODE
                birdWrapper.style.display = "none";
                suggestions.innerHTML = "";
                birdInput.value = "What is this bird";
                birdId.value = "";   // IMPORTANT: keep as empty string for Spring binding
            } else {
                // EXIT UNKNOWN MODE
                birdWrapper.style.display = "block";
                birdInput.value = "";
                birdId.value = "";
                suggestions.innerHTML = "";
            }
        });
        resetBtn.addEventListener("click", function () {
            unknownMode = false;
            birdWrapper.style.display = "block";
            birdInput.value = "";
            birdId.value = "";
            suggestions.innerHTML = "";
        });
    });
</script>
