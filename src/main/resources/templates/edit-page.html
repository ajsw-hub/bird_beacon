<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/main.css">
    <title>Edit Profile</title>

</head>

<body>

<div class="page-container">

    <h1 class="page-title">Edit Your Profile</h1>

    <form th:action="@{/my-aviary/edit-page}"
          th:object="${user}"
          method="post"
          enctype="multipart/form-data">

        <!-- Profile Picture Section -->
        <div class="form-section">
            <label class="profile-label">Profile Picture</label>

            <!-- Profile picture aligned left -->
            <img th:src="@{'/profileimg/' + ${user.profilepicture}}"
                 alt="Profile picture"
                 class="profile-picture">

            <!-- Instruction above file input -->
            <p class="upload-instruction">Choose a file to upload a new picture</p>

            <input id="profile-picture-input"
                   type="file"
                   name="imageFile"
                   accept="image/png, image/jpeg, image/jpg">
        </div>

        <!-- Bio Section -->
        <div class="form-section">
            <label for="bio" class="profile-label">Bio</label>
            <br>
            <textarea id="bio" th:field="*{bio}"
                      minlength="3"
                      maxlength="300"
                      rows="4"
                      cols="50"></textarea>
        </div>

        <!-- Date of Birth Section -->
        <div class="form-section">
            <label for="dateofbirth" class="profile-label">Date of Birth</label>
            <br>
            <input type="date"
                   id="dateofbirth"
                   name="dateofbirth"
                   th:field="*{dateofbirth}"
                   max="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" />
        </div>

        <input type="submit" value="Save Changes">

    </form>

</div>

</body>
</html>
